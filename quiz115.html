<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年會考地下城</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #222; color: #eee; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #e94560; }
        .container { display: flex; flex-direction: column; width: 100%; max-width: 600px; gap: 20px; }
        .quiz-area { background: #16213e; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .question-row { margin-bottom: 15px; font-size: 18px; padding: 10px; border-radius: 5px; transition: 0.3s; background: rgba(255,255,255,0.05); }
        .options-group { display: flex; gap: 10px; margin-top: 5px; justify-content: space-around;}
        .options-group label { cursor: pointer; padding: 8px 15px; background: #2a2a2a; border-radius: 5px; border: 1px solid #444; flex: 1; text-align: center; transition: 0.2s;}
        .options-group label:hover { background: #3a3a3a; }
        .options-group input[type="radio"] { display: none; }
        .options-group input[type="radio"]:checked + span { color: #e94560; font-weight: bold; text-shadow: 0 0 5px #e94560; }
        
        .wrong-answer { border: 2px solid red !important; background-color: rgba(255, 0, 0, 0.1); }
        
        .btn { padding: 12px 15px; font-size: 16px; margin: 5px 0; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; background-color: #0f3460; color: white; display: block; text-align: center; text-decoration: none; width: 100%; box-sizing: border-box;}
        .btn:hover { background-color: #1a4f8b; }
        .btn-open-pdf { background-color: #ff9800; color: #222; margin-bottom: 20px;}
        .btn-open-pdf:hover { background-color: #e68a00; }
        .btn-check { background-color: #e94560; margin: 20px 0;}
        .btn-check:hover { background-color: #ff5c77; }
        .btn-back { background-color: #4caf50; }
        .btn-back:hover { background-color: #5cdb61; }
        
        #result-msg { margin-top: 20px; font-size: 18px; font-weight: bold; color: #ffeb3b; text-align: center;}
        #history-area { margin-top: 30px; font-size: 14px; background: #2a2a2a; padding: 15px; border-radius: 5px; }
        .action-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 20px;}
    </style>
</head>
<body>

    <h1>115年會考地下城BOSS戰</h1>

    <div class="container">
        <div class="quiz-area">
            <a href="你的會考題本PDF連結" target="_blank" class="btn btn-open-pdf">📜 開啟會考題目本 (另開視窗)</a>

            <h3 style="text-align: center; margin-bottom: 20px;">請針對有標記顏色的題號作答</h3>
            
            <div id="inputs-container"></div>
            
            <button class="btn btn-check" onclick="checkAnswers()">⚔️ 送出攻擊 (對答案)</button>
            
            <div id="result-msg"></div>

            <div class="action-buttons">
                <a href="你的詳解PDF連結" class="btn" target="_blank">📖 前往查看PDF詳解</a>
                <button class="btn" onclick="retryQuiz()">🔄 重新作答</button>
                <a href="index.html" class="btn btn-back">🏰 回主畫面結算</a>
            </div>

            <div id="history-area">
                <h4>📓 戰鬥紀錄簿</h4>
                <p id="history-log">尚未有作答紀錄</p>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { id: 1, answer: 'B' },
            { id: 2, answer: 'A' },
            { id: 3, answer: 'D' },
            { id: 4, answer: 'A' },
            { id: 5, answer: 'D' },
            { id: 7, answer: 'C' },
            { id: 10, answer: 'D' },
            { id: 11, answer: 'B' },
            { id: 13, answer: 'A' },
            { id: 19, answer: 'A' },
            { id: 24, answer: 'B' },
            { id: 25, answer: 'A' },
            { id: 33, answer: 'C' },
            { id: 34, answer: 'D' },
            { id: 37, answer: 'B' },
            { id: 38, answer: 'A' }
        ];

        const totalQuestions = quizData.length;

        function initInputs() {
            const container = document.getElementById('inputs-container');
            container.innerHTML = '';
            
            quizData.forEach(q => {
                let optionsHtml = '';
                ['A', 'B', 'C', 'D'].forEach(opt => {
                    optionsHtml += `
                        <label>
                            <input type="radio" name="q${q.id}" value="${opt}">
                            <span>${opt}</span>
                        </label>
                    `;
                });

                container.innerHTML += `
                    <div class="question-row" id="row-q${q.id}">
                        <strong>題號 ${q.id}.</strong> 
                        <div class="options-group">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
            });
            updateHistoryLog();
        }

        function checkAnswers() {
            let correctCount = 0;
            let wrongQuestions = [];
            let allAnswered = true;

            quizData.forEach(q => {
                const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
                if (!selected) allAnswered = false;
            });

            if (!allAnswered) {
                alert("⚠️ 發現未填寫的題目！請將所有題目作答完畢再送出攻擊！");
                return;
            }

            quizData.forEach(q => {
                const selectedEl = document.querySelector(`input[name="q${q.id}"]:checked`);
                const userAnswer = selectedEl.value;
                const rowEl = document.getElementById(`row-q${q.id}`);
                
                rowEl.classList.remove('wrong-answer');

                if (userAnswer === q.answer) {
                    correctCount++;
                } else {
                    rowEl.classList.add('wrong-answer');
                    wrongQuestions.push(q.id);
                }
            });

            const accuracy = Math.round((correctCount / totalQuestions) * 100);
            
            let msg = '';
            if (accuracy === 100) {
                msg = "你使出極限威能攻破地下城,發現隱藏菁英寶箱!";
            } else if (accuracy >= 80) {
                msg = "恭喜你擊飛BOSS攻略成功,我知道你可以的,不確定的選項再確認清楚然後來挑戰大魔王找出隱藏菁英寶箱吧";
            } else if (accuracy >= 60) {
                msg = "恭喜你成功攻略地下城,旋轉得分";
            } else {
                msg = "被爆裂噴飛惹,練完功再來挑戰吧";
            }

            document.getElementById('result-msg').innerHTML = `
                答對：${correctCount} / ${totalQuestions}題<br>
                答對率：${accuracy}%<br><br>
                <span style="color:#fff;">${msg}</span>
            `;

            saveHistory(correctCount, accuracy, wrongQuestions);
            
            // 推送到主畫面的 bossHistory 陣列中以記錄所有進度與時間
            let history = JSON.parse(localStorage.getItem('bossHistory')) || [];
            history.push({
                level: '115年',
                time: new Date().toLocaleString(),
                accuracy: accuracy,
                availableOptions: null,
                chosenReward: null
            });
            localStorage.setItem('bossHistory', JSON.stringify(history));
        }

        function saveHistory(correct, accuracy, wrongList) {
            let historyList = JSON.parse(localStorage.getItem('quiz115_history')) || [];
            const record = {
                time: new Date().toLocaleString(),
                correct: correct,
                accuracy: accuracy,
                wrongList: wrongList.length > 0 ? wrongList.join(', ') : '無'
            };
            historyList.push(record);
            localStorage.setItem('quiz115_history', JSON.stringify(historyList));
            updateHistoryLog();
        }

        function updateHistoryLog() {
            let historyList = JSON.parse(localStorage.getItem('quiz115_history')) || [];
            const logEl = document.getElementById('history-log');
            if (historyList.length === 0) return;

            let html = '';
            historyList.slice().reverse().forEach((log, index) => {
                html += `⚔️ 挑戰 ${historyList.length - index} (${log.time})<br> 答對率: ${log.accuracy}% | 答錯題號: ${log.wrongList}<hr style="border-color:#444; margin:8px 0;">`;
            });
            logEl.innerHTML = html;
        }

        function retryQuiz() {
            quizData.forEach(q => {
                const rowEl = document.getElementById(`row-q${q.id}`);
                rowEl.classList.remove('wrong-answer');
                const radios = document.querySelectorAll(`input[name="q${q.id}"]`);
                radios.forEach(radio => radio.checked = false);
            });
            document.getElementById('result-msg').innerHTML = '';
        }

        window.onload = initInputs;
    </script>
</body>
</html>
