<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國文會考BOSS攻略挑戰(第1-2冊)</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #1a1a2e; color: #fff; text-align: center; padding: 20px; }
        h1 { color: #e94560; text-shadow: 2px 2px 4px #000; }
        .section { background: #16213e; margin: 20px auto; padding: 20px; border-radius: 10px; max-width: 600px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); text-align: left; }
        .section h2 { text-align: center; }
        button, select { padding: 10px 15px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .btn-role { background-color: #0f3460; color: white; }
        .btn-level { background-color: #e94560; color: white; text-decoration: none; display: inline-block; text-align: center; }
        .btn-reset { background-color: #d9534f; color: white; display: block; width: 100%; margin-top: 15px; }
        .btn-reset:hover { background-color: #c9302c; }
        .small-grey { color: #888; font-size: 12px; margin-top: 10px; text-align: center; }
        
        /* 寶箱樣式 */
        .chest-container { display: none; margin: 20px auto; padding: 20px; border-radius: 10px; max-width: 600px; text-align: center; }
        .chest-green { background-color: rgba(0, 128, 0, 0.2); border: 2px solid #4caf50; }
        .chest-yellow { background-color: rgba(255, 255, 0, 0.2); border: 2px solid #ffeb3b; }
        .chest-purple { background-color: rgba(128, 0, 128, 0.2); border: 2px solid #9c27b0; }
        .reward-btn { margin: 5px; padding: 10px; border-radius: 5px; cursor: pointer; border: 1px solid white; background: #333; color: white; }
        .reward-btn:hover { background: #555; }
        
        #character-photo { display: none; width: 150px; height: 150px; border-radius: 50%; margin: 10px auto; object-fit: cover; border: 3px solid #e94560; }
        .center { text-align: center; }
        
        .progress-item { background: rgba(255,255,255,0.05); padding: 12px; margin-bottom: 12px; border-radius: 5px; font-size: 14px; border-left: 4px solid #e94560; }
    </style>
</head>
<body>

    <h1 class="center">國文會考BOSS攻略挑戰(第1-2冊)</h1>

    <!-- 角色選擇 -->
    <div class="section center">
        <h2>角色選擇</h2>
        <select id="role-select">
            <option value="">-- 請選擇角色 --</option>
            <option value="Daren">Daren</option>
        </select>
        <button class="btn-role" onclick="showCharacter()">確認角色</button>
        <br>
        <img id="character-photo" src="https://via.placeholder.com/150?text=Daren" alt="Daren的照片">
    </div>

    <!-- 攻略進度 -->
    <div class="section">
        <h2>目前攻略進度</h2>
        <div id="progress-display">尚無攻略紀錄，趕快開始挑戰吧！</div>
    </div>

    <!-- 寶箱區 (動態顯示) -->
    <div id="chest-area" class="chest-container">
        <h2 id="chest-title"></h2>
        <p>請選擇你的戰利品（三選一）：</p>
        <div id="chest-options"></div>
    </div>

    <!-- 關卡選擇 -->
    <div class="section center">
        <h2>地下城入口</h2>
        <p class="small-grey">請選擇您要挑戰的年度測驗BOSS. 3, 2, 1, GO~~SHOOT</p>
        <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
            <a href="quiz115.html" class="btn-level">115年會考地下城</a>
            <a href="quiz114.html" class="btn-level">114年會考地下城</a>
        </div>
        <br>
        <p class="small-grey">附上各年的題目連結: <a href="https://cap.rcpet.edu.tw/" target="_blank" style="color: #aaa;">會考中心</a></p>
        
        <!-- 重新開始遊戲按鈕 -->
        <button class="btn-reset" onclick="resetGame()">🔄 重新開始遊戲 (清除所有進度)</button>
    </div>

    <p class="small-grey center">冒險者一起攻略會考吧GOGO</p>

    <script>
        function showCharacter() {
            const role = document.getElementById('role-select').value;
            if (role === 'Daren') {
                document.getElementById('character-photo').style.display = 'block';
            } else {
                alert('請先選擇角色！');
            }
        }

        window.onload = function() {
            renderProgress();
            checkPendingChests();
        }

        function renderProgress() {
            const history = JSON.parse(localStorage.getItem('bossHistory')) || [];
            const display = document.getElementById('progress-display');
            
            if (history.length > 0) {
                let html = '';
                history.forEach((data, index) => {
                    html += `
                        <div class="progress-item">
                            <strong>[紀錄 ${index + 1}] ${data.level}地下城</strong><br>
                            ⏱️ 攻略時間：${data.time || '未知'}<br>
                            📊 答對率：${data.accuracy}%<br>
                            🎁 可選寶箱：${data.availableOptions ? data.availableOptions.join(' / ') : '未解鎖'}<br>
                            🏆 最終選擇：<span style="color: #ffeb3b; font-weight: bold;">${data.chosenReward || '尚未選擇寶箱'}</span>
                        </div>
                    `;
                });
                display.innerHTML = html;
            } else {
                display.innerHTML = '<p class="center">尚無攻略紀錄，趕快開始挑戰吧！</p>';
            }
        }

        function checkPendingChests() {
            const history = JSON.parse(localStorage.getItem('bossHistory')) || [];
            
            for (let i = 0; i < history.length; i++) {
                if (history[i].accuracy >= 60 && !history[i].chosenReward) {
                    showChest(history[i].level, history[i].accuracy, i);
                    break;
                }
            }
        }

        function showChest(level, acc, historyIndex) {
            const chestArea = document.getElementById('chest-area');
            const chestTitle = document.getElementById('chest-title');
            const chestOptions = document.getElementById('chest-options');
            chestArea.style.display = 'block';

            let options = [];
            if (acc === 100) {
                chestArea.className = 'chest-container chest-purple';
                chestTitle.innerText = `🟣 ${level} 菁英探險者寶箱開啟！`;
                options = ["看youtube 30分鐘", "玩遊戲30分鐘", "全家一起跳繩4000下"];
            } else if (acc >= 80) {
                chestArea.className = 'chest-container chest-yellow';
                chestTitle.innerText = `🟡 ${level} 熟練探險者寶箱開啟！`;
                options = ["看youtube 15分鐘", "玩遊戲15分鐘", "全家一起跳繩2000下"];
            } else if (acc >= 60) {
                chestArea.className = 'chest-container chest-green';
                chestTitle.innerText = `🟢 ${level} 新手冒險者寶箱開啟！`;
                options = ["舉辦一場3人戰鬥陀螺大賽", "睡覺多一隻娃娃", "選擇想吃的健康晚餐"];
            }

            window.currentChestIndex = historyIndex;
            window.currentChestOptions = options;

            chestOptions.innerHTML = '';
            options.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'reward-btn';
                btn.innerText = opt;
                btn.onclick = () => claimReward(opt);
                chestOptions.appendChild(btn);
            });
        }

        function getRewardCategory(reward) {
            if (reward.includes('youtube')) return 'youtube';
            if (reward.includes('玩遊戲')) return 'game';
            if (reward.includes('跳繩')) return 'jump';
            return 'other';
        }

        function getRewardValue(reward) {
            if (reward.includes('30分鐘')) return 30;
            if (reward.includes('15分鐘')) return 15;
            if (reward.includes('4000下')) return 4000;
            if (reward.includes('2000下')) return 2000;
            return 1;
        }

        function claimReward(reward) {
            let history = JSON.parse(localStorage.getItem('bossHistory')) || [];
            let targetRecord = history[window.currentChestIndex];

            let newCategory = getRewardCategory(reward);
            let newValue = getRewardValue(reward);
            let finalRewardText = reward;

            if (newCategory === 'youtube' || newCategory === 'game' || newCategory === 'jump') {
                let maxExistingValue = 0;
                history.forEach((rec, idx) => {
                    if (idx !== window.currentChestIndex && rec.chosenReward) {
                        let recCat = getRewardCategory(rec.chosenReward);
                        // 從記錄文字中解析出已經領取過的核心數值（處理可能包含括號備註的字串）
                        let val = 0;
                        if (rec.chosenReward.includes('30分鐘') || rec.chosenReward.includes('4000下')) val = (newCategory === 'jump' ? 4000 : 30);
                        else if (rec.chosenReward.includes('15分鐘') || rec.chosenReward.includes('2000下')) val = (newCategory === 'jump' ? 2000 : 15);
                        
                        if (val > maxExistingValue) maxExistingValue = val;
                    }
                });

                if (newValue > maxExistingValue) {
                    let diff = newValue - maxExistingValue;
                    if (newCategory === 'youtube' || newCategory === 'game') {
                        finalRewardText = `看youtube ${diff}分鐘` (newCategory === 'youtube' ? `看youtube ${diff}分鐘` : `玩遊戲 ${diff}分鐘`);
                        // 修正變數賦值
                        if (newCategory === 'youtube') finalRewardText = `看youtube ${diff}分鐘`;
                        if (newCategory === 'game') finalRewardText = `玩遊戲 ${diff}分鐘`;
                    } else if (newCategory === 'jump') {
                        finalRewardText = `全家一起跳繩${diff}下`;
                    }
                } else {
                    finalRewardText = `${reward} (同屬性已領過相同或更高額度)`;
                }
            } else {
                let alreadyPicked = false;
                history.forEach((rec, idx) => {
                    if (idx !== window.currentChestIndex && rec.chosenReward && rec.chosenReward.includes(reward)) {
                        alreadyPicked = true;
                    }
                });
                if (alreadyPicked) {
                    finalRewardText = `${reward} (此獨特獎勵先前已領取過)`;
                }
            }

            alert('恭喜獲得戰利品：\n' + finalRewardText);
            document.getElementById('chest-area').style.display = 'none';

            targetRecord.availableOptions = window.currentChestOptions;
            targetRecord.chosenReward = finalRewardText;
            localStorage.setItem('bossHistory', JSON.stringify(history));

            renderProgress();
            checkPendingChests();
        }

        function resetGame() {
            if (confirm("⚠️ 確定要重新開始遊戲嗎？這將會清除所有地下城的攻略紀錄與寶箱戰利品！")) {
                localStorage.removeItem('bossHistory');
                localStorage.removeItem('bossProgress');
                localStorage.removeItem('quiz115_history');
                localStorage.removeItem('quiz114_history');
                alert("遊戲進度已全部重置！");
                location.reload();
            }
        }
    </script>
</body>
</html>
