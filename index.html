<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國文會考BOSS攻略挑戰(第1-2冊)</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #1a1a2e; color: #fff; text-align: center; padding: 20px; }
        h1 { color: #e94560; text-shadow: 2px 2px 4px #000; }
        .section { background: #16213e; margin: 20px auto; padding: 20px; border-radius: 10px; max-width: 600px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); text-align: left; }
        .section h2 { text-align: center; }
        button, select { padding: 10px 15px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .btn-role { background-color: #0f3460; color: white; }
        .btn-level { background-color: #e94560; color: white; text-decoration: none; display: inline-block; text-align: center; }
        .small-grey { color: #888; font-size: 12px; margin-top: 10px; text-align: center; }
        
        /* 寶箱樣式 */
        .chest-container { display: none; margin: 20px auto; padding: 20px; border-radius: 10px; max-width: 600px; text-align: center; }
        .chest-green { background-color: rgba(0, 128, 0, 0.2); border: 2px solid #4caf50; }
        .chest-yellow { background-color: rgba(255, 255, 0, 0.2); border: 2px solid #ffeb3b; }
        .chest-purple { background-color: rgba(128, 0, 128, 0.2); border: 2px solid #9c27b0; }
        .reward-btn { margin: 5px; padding: 10px; border-radius: 5px; cursor: pointer; border: 1px solid white; background: #333; color: white; }
        .reward-btn:hover { background: #555; }
        
        #character-photo { display: none; width: 150px; height: 150px; border-radius: 50%; margin: 10px auto; object-fit: cover; border: 3px solid #e94560; }
        .center { text-align: center; }
        
        .progress-item { background: rgba(255,255,255,0.05); padding: 10px; margin-bottom: 10px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <h1 class="center">國文會考BOSS攻略挑戰(第1-2冊)</h1>

    <!-- 角色選擇 -->
    <div class="section center">
        <h2>角色選擇</h2>
        <select id="role-select">
            <option value="">-- 請選擇角色 --</option>
            <option value="Daren">Daren</option>
        </select>
        <button class="btn-role" onclick="showCharacter()">確認角色</button>
        <br>
        <!-- 請將 src 替換為實際照片的網址或相對路徑 -->
        <img id="character-photo" src="https://via.placeholder.com/150?text=Daren" alt="Daren的照片">
    </div>

    <!-- 攻略進度 -->
    <div class="section">
        <h2>目前攻略進度</h2>
        <div id="progress-display">尚無攻略紀錄，趕快開始挑戰吧！</div>
    </div>

    <!-- 寶箱區 (動態顯示) -->
    <div id="chest-area" class="chest-container">
        <h2 id="chest-title"></h2>
        <p>請選擇你的戰利品（三選一）：</p>
        <div id="chest-options"></div>
    </div>

    <!-- 關卡選擇 -->
    <div class="section center">
        <h2>地下城入口</h2>
        <p class="small-grey">請選擇您要挑戰的年度測驗BOSS. 3, 2, 1, GO~~SHOOT</p>
        <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
            <a href="quiz115.html" class="btn-level">115年會考地下城</a>
            <a href="quiz114.html" class="btn-level">114年會考地下城</a>
        </div>
        <br>
        <p class="small-grey">附上各年的題目連結: <a href="https://cap.rcpet.edu.tw/" target="_blank" style="color: #aaa;">會考中心</a></p>
    </div>

    <p class="small-grey center">冒險者一起攻略會考吧GOGO</p>

    <script>
        // 顯示角色照片
        function showCharacter() {
            const role = document.getElementById('role-select').value;
            if (role === 'Daren') {
                document.getElementById('character-photo').style.display = 'block';
            } else {
                alert('請先選擇角色！');
            }
        }

        // 讀取進度與寶箱邏輯
        window.onload = function() {
            renderProgress();
            
            // 檢查是否有剛打完但還沒開寶箱的關卡 (這裡以 115 或 114 為例，動態抓取最新一次通關且未領獎的)
            checkPendingChests();
        }

        function renderProgress() {
            const progress = JSON.parse(localStorage.getItem('bossProgress')) || {};
            const display = document.getElementById('progress-display');
            
            if (Object.keys(progress).length > 0) {
                let html = '';
                for (let level in progress) {
                    let data = progress[level];
                    html += `
                        <div class="progress-item">
                            <strong>${level}地下城</strong><br>
                            ⏱️ 攻略時間：${data.time || '未知'}<br>
                            📊 答對率：${data.accuracy}%<br>
                            🎁 可選寶箱：${data.availableOptions ? data.availableOptions.join(' / ') : '未解鎖'}<br>
                            🏆 最終選擇：<span style="color: #ffeb3b; font-weight: bold;">${data.chosenReward || '尚未選擇寶箱'}</span>
                        </div>
                    `;
                }
                display.innerHTML = html;
            } else {
                display.innerHTML = '<p class="center">尚無攻略紀錄，趕快開始挑戰吧！</p>';
            }
        }

        function checkPendingChests() {
            const progress = JSON.parse(localStorage.getItem('bossProgress')) || {};
            
            // 檢查各年度是否有達標 60% 但還沒選寶箱的
            for (let level in progress) {
                let data = progress[level];
                if (data.accuracy >= 60 && !data.chosenReward) {
                    showChest(level, data.accuracy);
                    break; // 每次只彈出一個未領獎的寶箱
                }
            }
        }

        function showChest(level, acc) {
            const chestArea = document.getElementById('chest-area');
            const chestTitle = document.getElementById('chest-title');
            const chestOptions = document.getElementById('chest-options');
            chestArea.style.display = 'block';

            let options = [];
            if (acc === 100) {
                chestArea.className = 'chest-container chest-purple';
                chestTitle.innerText = `🟣 ${level} 菁英探險者寶箱開啟！`;
                options = ["看youtube 30分鐘", "玩遊戲30分鐘", "全家一起跳繩4000下"];
            } else if (acc >= 80) {
                chestArea.className = 'chest-container chest-yellow';
                chestTitle.innerText = `🟡 ${level} 熟練探險者寶箱開啟！`;
                options = ["看youtube 15分鐘", "玩遊戲15分鐘", "全家一起跳繩2000下"];
            } else if (acc >= 60) {
                chestArea.className = 'chest-container chest-green';
                chestTitle.innerText = `🟢 ${level} 新手冒險者寶箱開啟！`;
                options = ["舉辦一場3人戰鬥陀螺大賽", "睡覺多一隻娃娃", "選擇想吃的健康晚餐"];
            }

            // 將選項暫存到記憶體中以便後續寫入 localStorage
            window.currentChestLevel = level;
            window.currentChestOptions = options;

            chestOptions.innerHTML = '';
            options.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'reward-btn';
                btn.innerText = opt;
                btn.onclick = () => claimReward(opt);
                chestOptions.appendChild(btn);
            });
        }

        function claimReward(reward) {
            alert('恭喜獲得戰利品：' + reward + '！');
            document.getElementById('chest-area').style.display = 'none';

            // 更新對應年度的寶箱選擇結果與可選清單
            let progress = JSON.parse(localStorage.getItem('bossProgress')) || {};
            if (progress[window.currentChestLevel]) {
                progress[window.currentChestLevel].availableOptions = window.currentChestOptions;
                progress[window.currentChestLevel].chosenReward = reward;
                localStorage.setItem('bossProgress', JSON.stringify(progress));
            }

            // 重新整理介面顯示
            renderProgress();
        }
    </script>
</body>
</html>
